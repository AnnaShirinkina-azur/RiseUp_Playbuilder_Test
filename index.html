<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rise Playable Builder</title>
<style>
/* ── Reset & tokens ────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0d0d14;
  --surface:    #161622;
  --surface2:   #1e1e2e;
  --border:     rgba(255,255,255,0.07);
  --accent:     #7c6cf5;
  --accent2:    #e05252;
  --text:       #e8e8f0;
  --text-dim:   rgba(232,232,240,0.45);
  --radius:     12px;
  --radius-sm:  8px;
  --font:       'Inter', system-ui, sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ─────────────────────────────────────────────────────────────── */
header {
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0;
  background: var(--bg);
  z-index: 100;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
}
.logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.header-actions { display: flex; gap: 10px; align-items: center; }
.badge {
  font-size: 11px; font-weight: 600;
  padding: 3px 8px; border-radius: 20px;
  background: rgba(124,108,245,0.15);
  color: var(--accent);
  border: 1px solid rgba(124,108,245,0.25);
}

/* ── Layout ─────────────────────────────────────────────────────────────── */
.workspace {
  flex: 1;
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 0;
  overflow: hidden;
  height: calc(100vh - 61px);
}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

/* ── Tabs ───────────────────────────────────────────────────────────────── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  gap: 2px;
}
.tab-btn {
  padding: 14px 12px 12px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-dim);
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ── Tab panels ─────────────────────────────────────────────────────────── */
.tab-panel { display: none; padding: 20px 16px; flex-direction: column; gap: 6px; }
.tab-panel.active { display: flex; }

/* ── Section ────────────────────────────────────────────────────────────── */
.section {
  margin-bottom: 4px;
}
.section-title {
  font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 14px 0 8px;
  display: flex; align-items: center; gap: 6px;
}
.section-title::after {
  content: ''; flex: 1;
  height: 1px; background: var(--border);
}

/* ── Field ──────────────────────────────────────────────────────────────── */
.field {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
}
.field-wide { grid-template-columns: 1fr; gap: 6px; }
.field label {
  font-size: 13px; color: var(--text);
  display: flex; flex-direction: column; gap: 2px;
}
.field label small {
  font-size: 11px; color: var(--text-dim);
  font-weight: 400;
}

/* Inputs */
input[type=number], input[type=text] {
  width: 72px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  padding: 6px 8px;
  outline: none;
  transition: border-color 0.15s;
}
input[type=number]:focus, input[type=text]:focus {
  border-color: var(--accent);
}
input[type=color] {
  width: 38px; height: 32px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface2);
  cursor: pointer;
  padding: 2px;
}

input[type=range] {
  -webkit-appearance: none;
  width: 100%; height: 4px;
  background: var(--surface2);
  border-radius: 4px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: 2px solid var(--bg);
  box-shadow: 0 0 0 1px var(--accent);
}
.range-row {
  display: grid;
  grid-template-columns: 1fr 50px;
  gap: 10px; align-items: center;
}
.range-row span {
  font-size: 13px; font-weight: 600;
  color: var(--accent); text-align: right;
}

/* Color swatch grid */
.color-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-top: 4px;
}
.color-cell {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.color-cell label { font-size: 10px; color: var(--text-dim); }

/* ── Preview panel ──────────────────────────────────────────────────────── */
.preview-panel {
  background: #080810;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 28px;
  gap: 20px;
  overflow-y: auto;
}
.preview-frame-wrap {
  width: 260px;
  height: 563px;
  border-radius: 36px;
  overflow: hidden;
  border: 1.5px solid var(--border);
  box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
  position: relative;
  background: #0d0d14;
  flex-shrink: 0;
}
.preview-frame-wrap iframe {
  width: 390px; height: 844px;
  transform: scale(0.6667);
  transform-origin: top left;
  border: none;
  pointer-events: none;
}
.preview-frame-wrap.interactive iframe {
  pointer-events: auto;
}
.preview-label {
  font-size: 12px; color: var(--text-dim);
  text-align: center;
}

/* ── Build bar ──────────────────────────────────────────────────────────── */
.build-bar {
  padding: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── Buttons ────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 10px 18px;
  border-radius: var(--radius);
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  line-height: 1;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: #6a5ce0; }
.btn-primary:active { transform: scale(0.97); }

.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

.btn-download {
  background: linear-gradient(135deg, var(--accent), #9c5df5);
  color: #fff;
  width: 100%;
  padding: 13px;
  font-size: 15px;
}
.btn-download:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(124,108,245,0.3); }
.btn-download:disabled {
  opacity: 0.5; pointer-events: none; transform: none; box-shadow: none;
}
.btn-download:active { transform: translateY(0); }

/* ── Progress ───────────────────────────────────────────────────────────── */
.progress-wrap {
  display: none;
  flex-direction: column; gap: 6px;
}
.progress-wrap.visible { display: flex; }
.progress-bar-bg {
  height: 4px; background: var(--surface2);
  border-radius: 4px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #9c5df5);
  border-radius: 4px;
  transition: width 0.3s;
  width: 0%;
}
.progress-msg {
  font-size: 12px; color: var(--text-dim);
}
.size-badge {
  display: none;
  font-size: 12px; color: var(--accent);
  font-weight: 600;
}
.size-badge.visible { display: block; }

/* ── Error toast ────────────────────────────────────────────────────────── */
.error-msg {
  display: none;
  padding: 10px 12px;
  background: rgba(224,82,82,0.15);
  border: 1px solid rgba(224,82,82,0.3);
  border-radius: var(--radius-sm);
  color: var(--accent2);
  font-size: 13px;
}
.error-msg.visible { display: block; }

/* ── Preview action bar ─────────────────────────────────────────────────── */
.preview-actions {
  display: flex; gap: 10px;
}

/* ── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  .workspace {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }
  .sidebar { max-height: 55vh; border-right: none; border-bottom: 1px solid var(--border); }
  .preview-panel { padding: 16px; }
  .preview-frame-wrap { width: 195px; height: 422px; border-radius: 28px; }
  .preview-frame-wrap iframe { transform: scale(0.5); }
}
</style>
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-icon">🎈</div>
    Rise Playable Builder
    <span class="badge">Beta</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-secondary" id="btn-reset" title="Reset to defaults">↺ Reset</button>
  </div>
</header>

<!-- ── Workspace ────────────────────────────────────────────────────────── -->
<div class="workspace">

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="gameplay">Gameplay</button>
      <button class="tab-btn" data-tab="visuals">Visuals</button>
    </div>

    <!-- ── Gameplay tab ──────────────────────────────────────────────── -->
    <div class="tab-panel active" id="tab-gameplay">

      <div class="section">
        <div class="section-title">Player</div>

        <div class="field">
          <label>Lives <small>How many hits before lose</small></label>
          <input type="number" id="cfg-lives" value="3" min="1" max="9" step="1">
        </div>

        <div class="field">
          <label>Player size <small>Scale multiplier</small></label>
          <input type="number" id="cfg-playerSize" value="1.0" min="0.5" max="2.0" step="0.1">
        </div>
      </div>

      <div class="section">
        <div class="section-title">Speed</div>

        <div class="field field-wide">
          <label>Game speed <small>Initial scroll speed (px/s)</small></label>
          <div class="range-row">
            <input type="range" id="cfg-gameSpeed" value="3.2" min="1" max="10" step="0.1"
              oninput="document.getElementById('cfg-gameSpeed-val').textContent=parseFloat(this.value).toFixed(1)">
            <span id="cfg-gameSpeed-val">3.2</span>
          </div>
        </div>

        <div class="field field-wide">
          <label>Acceleration <small>Added per stage completed</small></label>
          <div class="range-row">
            <input type="range" id="cfg-acceleration" value="0.4" min="0" max="2" step="0.05"
              oninput="document.getElementById('cfg-acc-val').textContent=parseFloat(this.value).toFixed(2)">
            <span id="cfg-acc-val">0.40</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Obstacles</div>

        <div class="field field-wide">
          <label>Push force <small>How hard player pushes obstacles</small></label>
          <div class="range-row">
            <input type="range" id="cfg-pushForce" value="6" min="1" max="20" step="0.5"
              oninput="document.getElementById('cfg-push-val').textContent=parseFloat(this.value).toFixed(1)">
            <span id="cfg-push-val">6.0</span>
          </div>
        </div>

        <div class="field field-wide">
          <label>Move duration <small>Obstacle side-to-side time (ms)</small></label>
          <div class="range-row">
            <input type="range" id="cfg-moveDuration" value="1800" min="400" max="4000" step="100"
              oninput="document.getElementById('cfg-move-val').textContent=this.value">
            <span id="cfg-move-val">1800</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">UI / Timing</div>

        <div class="field">
          <label>HP bar time <small>ms shown after respawn</small></label>
          <input type="number" id="cfg-hpBarShowTime" value="2000" min="500" max="8000" step="100">
        </div>

        <div class="field">
          <label>Tutorial time <small>ms before auto-dismiss</small></label>
          <input type="number" id="cfg-tutorialTime" value="3000" min="500" max="10000" step="100">
        </div>
      </div>

    </div><!-- /gameplay -->

    <!-- ── Visuals tab ───────────────────────────────────────────────── -->
    <div class="tab-panel" id="tab-visuals">

      <div class="section">
        <div class="section-title">Player (Balloon)</div>
        <div class="field">
          <label>Fill color</label>
          <input type="color" id="cfg-playerColor" value="#f5e642">
        </div>
        <div class="field">
          <label>Outline / string</label>
          <input type="color" id="cfg-playerOutline" value="#ffffff">
        </div>
      </div>

      <div class="section">
        <div class="section-title">Obstacles</div>
        <div class="field">
          <label>Primary color</label>
          <input type="color" id="cfg-obstacleColor" value="#e05252">
        </div>
        <div class="field">
          <label>Alternate color</label>
          <input type="color" id="cfg-obstacleColorAlt" value="#5282e0">
        </div>
      </div>

      <div class="section">
        <div class="section-title">Environment</div>
        <div class="field">
          <label>Background</label>
          <input type="color" id="cfg-bgColor" value="#1a1a2e">
        </div>
        <div class="field">
          <label>Ground lines</label>
          <input type="color" id="cfg-groundColor" value="#2a2a40">
        </div>
        <div class="field">
          <label>Particles</label>
          <input type="color" id="cfg-particleColor" value="#f5e642">
        </div>
      </div>

      <div class="section">
        <div class="section-title">Stage palette</div>
        <p style="font-size:12px;color:var(--text-dim);margin-bottom:10px;">
          One accent color per stage (progress dots + glow)
        </p>
        <div class="color-grid">
          <div class="color-cell">
            <input type="color" id="cfg-stage0" value="#e05252">
            <label>Stage 1</label>
          </div>
          <div class="color-cell">
            <input type="color" id="cfg-stage1" value="#52a0e0">
            <label>Stage 2</label>
          </div>
          <div class="color-cell">
            <input type="color" id="cfg-stage2" value="#52e08a">
            <label>Stage 3</label>
          </div>
          <div class="color-cell">
            <input type="color" id="cfg-stage3" value="#e07d52">
            <label>Stage 4</label>
          </div>
          <div class="color-cell">
            <input type="color" id="cfg-stage4" value="#c052e0">
            <label>Stage 5</label>
          </div>
        </div>
      </div>

    </div><!-- /visuals -->

    <!-- ── Build bar ─────────────────────────────────────────────────── -->
    <div class="build-bar">
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div class="progress-msg" id="progress-msg">Building…</div>
      </div>
      <div class="error-msg" id="error-msg"></div>
      <div class="size-badge" id="size-badge"></div>
      <button class="btn btn-download" id="btn-download">
        ⬇ Download Playable HTML
      </button>
    </div>

  </aside>

  <!-- ── Preview panel ─────────────────────────────────────────────────── -->
  <main class="preview-panel">
    <div class="preview-actions">
      <button class="btn btn-secondary" id="btn-preview">▶ Update Preview</button>
      <button class="btn btn-secondary" id="btn-interact" title="Enable/disable interaction in preview">
        🖱 Interact
      </button>
    </div>

    <div class="preview-frame-wrap" id="preview-wrap">
      <iframe id="preview-iframe" title="Playable preview"></iframe>
    </div>

    <p class="preview-label">
      390 × 844 px preview — click "Update Preview" after changing settings
    </p>
  </main>

</div><!-- /workspace -->

<!-- ── Scripts ──────────────────────────────────────────────────────────── -->
<script src="src/playable-template.js"></script>
<script src="src/builder.js"></script>
<script>
(function () {
  'use strict';

  // ── Tabs ───────────────────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    });
  });

  // ── Progress helpers ──────────────────────────────────────────────────
  function setProgress(p, msg) {
    const wrap = document.getElementById('progress-wrap');
    const fill = document.getElementById('progress-fill');
    const msgEl = document.getElementById('progress-msg');
    wrap.classList.add('visible');
    fill.style.width = (p * 100) + '%';
    msgEl.textContent = msg || '';
  }
  function hideProgress() {
    document.getElementById('progress-wrap').classList.remove('visible');
  }
  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = '⚠ ' + msg;
    el.classList.add('visible');
    setTimeout(() => el.classList.remove('visible'), 6000);
  }
  function showSize(kb) {
    const el = document.getElementById('size-badge');
    const icon = kb < 5120 ? '✅' : '⚠';
    el.textContent = `${icon} ${kb} KB  (limit: 5 MB)`;
    el.classList.add('visible');
  }

  // ── Download button ───────────────────────────────────────────────────
  const btnDl = document.getElementById('btn-download');
  btnDl.addEventListener('click', async () => {
    btnDl.disabled = true;
    document.getElementById('size-badge').classList.remove('visible');
    document.getElementById('error-msg').classList.remove('visible');

    await RiseBuilder.buildAndDownload({
      assetsBase: 'Assets',
      onProgress: (p, msg) => setProgress(p, msg),
      onDone: (kb) => {
        hideProgress();
        showSize(kb);
        btnDl.disabled = false;
      },
      onError: (msg) => {
        hideProgress();
        showError(msg);
        btnDl.disabled = false;
      },
    });
  });

  // ── Preview button ────────────────────────────────────────────────────
  let interactMode = false;
  const iframe = document.getElementById('preview-iframe');
  const wrap = document.getElementById('preview-wrap');

  document.getElementById('btn-preview').addEventListener('click', async () => {
    const btn = document.getElementById('btn-preview');
    btn.disabled = true;
    btn.textContent = '⏳ Building…';
    await RiseBuilder.buildPreview(iframe, {
      assetsBase: 'Assets',
      onProgress: (p, msg) => setProgress(p, msg),
      onError: (msg) => { showError(msg); },
    });
    hideProgress();
    btn.disabled = false;
    btn.textContent = '▶ Update Preview';
  });

  document.getElementById('btn-interact').addEventListener('click', () => {
    interactMode = !interactMode;
    wrap.classList.toggle('interactive', interactMode);
    document.getElementById('btn-interact').textContent =
      interactMode ? '🔒 Lock' : '🖱 Interact';
  });

  // ── Reset ─────────────────────────────────────────────────────────────
  const DEFAULTS = {
    'cfg-lives': 3, 'cfg-playerSize': 1.0,
    'cfg-gameSpeed': 3.2, 'cfg-acceleration': 0.4,
    'cfg-pushForce': 6, 'cfg-moveDuration': 1800,
    'cfg-hpBarShowTime': 2000, 'cfg-tutorialTime': 3000,
    'cfg-playerColor': '#f5e642', 'cfg-playerOutline': '#ffffff',
    'cfg-obstacleColor': '#e05252', 'cfg-obstacleColorAlt': '#5282e0',
    'cfg-bgColor': '#1a1a2e', 'cfg-groundColor': '#2a2a40',
    'cfg-particleColor': '#f5e642',
    'cfg-stage0': '#e05252', 'cfg-stage1': '#52a0e0',
    'cfg-stage2': '#52e08a', 'cfg-stage3': '#e07d52', 'cfg-stage4': '#c052e0',
  };

  document.getElementById('btn-reset').addEventListener('click', () => {
    Object.entries(DEFAULTS).forEach(([id, val]) => {
      const el = document.getElementById(id);
      if (el) { el.value = val; el.dispatchEvent(new Event('input')); }
    });
  });

  // ── Auto-init preview on load ─────────────────────────────────────────
  // Lightweight: just show the game running in-panel without assets
  // (no asset fetch — just uses template directly)
  (function initInlinePreview() {
    const root = document.createElement('div');
    root.style.cssText = 'width:390px;height:844px;position:absolute;top:0;left:0;overflow:hidden;';
    // We show a "click Update Preview" placeholder instead
    const placeholder = document.createElement('div');
    placeholder.style.cssText = `
      width:100%;height:100%;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:14px;
      color:rgba(232,232,240,0.35);
      font-size:14px;
      background:#0d0d14;
    `;
    placeholder.innerHTML = `
      <div style="font-size:48px">🎈</div>
      <div style="font-weight:600;color:rgba(232,232,240,0.6)">Rise Playable</div>
      <div>Click <strong style="color:#7c6cf5">▶ Update Preview</strong> to see the game</div>
    `;
    // Use srcdoc for a clean placeholder
    iframe.srcdoc = `<!DOCTYPE html><html><head>
      <style>*{margin:0;padding:0;box-sizing:border-box}
      html,body{width:100%;height:100%;background:#0d0d14;
        display:flex;align-items:center;justify-content:center;
        flex-direction:column;gap:14px;
        font-family:system-ui;color:rgba(232,232,240,0.4);font-size:14px}
      </style></head><body>
      <div style="font-size:48px">🎈</div>
      <div style="font-weight:600;font-size:16px;color:rgba(232,232,240,0.65)">Rise Playable</div>
