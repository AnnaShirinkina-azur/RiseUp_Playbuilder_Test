(function(){
  var root=document.getElementById('gr');
  function orNow(){return window.innerWidth>window.innerHeight?'landscape':'portrait';}
  cfg.orientation=orNow();root.className=cfg.orientation;
  cfg.audioSources={bgm:sp.audio_bgm||a[DEFAULT_AUDIO.bgm]||null,win:sp.audio_win||a[DEFAULT_AUDIO.win]||null,lose:sp.audio_lose||a[DEFAULT_AUDIO.lose]||null,hit:sp.audio_hit||a[DEFAULT_AUDIO.hit]||null,shield:sp.audio_shield||a[DEFAULT_AUDIO.shield]||null};
  var game=null;
  function onOrient(){var o=orNow();cfg.orientation=o;root.className=o;if(game&&game.setOrientation)game.setOrientation(o);}
  window.addEventListener('resize',onOrient);window.addEventListener('orientationchange',onOrient);
  var loader=document.getElementById('loader');
  var firstBg=sp.background;if(firstBg)root.style.setProperty('--loader-bg','url('+JSON.stringify(firstBg)+')');else root.style.setProperty('--loader-bg','none');
  var imgs={};var keys=Object.keys(sp).filter(function(k){return !/^audio_/.test(k)&&k!=='custom_font';});
  function boot(){if(loader)loader.style.display='none';var go=function(){onOrient();game=RisePlayable.init(root,cfg,imgs,{onCTA:function(){try{var u=(cfg.storeUrl||'').trim();if(!u)return;if(typeof mraid!=='undefined'&&mraid.open)mraid.open(u);else window.open(u,'_blank');}catch(e){}},onWin:function(){},onLose:function(){},onStageChange:function(){}});window.RiseGame=game;};if(document.fonts&&document.fonts.load){Promise.all([document.fonts.load("700 40px Baloo2"),document.fonts.load("600 40px Kameron"),document.fonts.load("400 40px LiberationSans")]).then(go).catch(go);}else{go();}}
  function loadImage(k){return new Promise(function(resolve){var img=new Image();img.onload=function(){var done=function(){imgs[k]=img;resolve();};if(img.decode)img.decode().then(done).catch(done);else done();};img.onerror=function(){resolve();};img.src=sp[k];});}
  if(!keys.length){boot();return;}
  Promise.all(keys.map(loadImage)).then(boot);
})();
